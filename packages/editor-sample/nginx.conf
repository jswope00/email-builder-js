server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    # Redirect unauthenticated visitors to Drupal login
    location @login_redirect {
        return 302 https://rheumnow.com/user/login?destination=https://emails.rheumnow.com$request_uri;
    }

    # Internal auth sub-request proxied to the Express API (Docker service name)
    location = /internal/auth-check {
        internal;
        proxy_pass http://api-prod:3001/api/auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
    }

    # Handle the base path
    location /email-builder-js/ {
        auth_request /internal/auth-check;
        error_page 401 = @login_redirect;
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    # Root location (if accessing without base path)
    location / {
        auth_request /internal/auth-check;
        error_page 401 = @login_redirect;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (no auth needed once the HTML shell is served)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
